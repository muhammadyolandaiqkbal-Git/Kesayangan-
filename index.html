<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Gift For You - Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Mrs+Saint+Delafield&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --cream: #fdf5e6; --paper: #FFFDD0; --black: #2c2c2c; }
        body { font-family: 'Poppins', sans-serif; background: var(--cream); margin: 0; overflow: hidden; touch-action: none; }
        .screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .hidden { display: none !important; }
        .shorelines { font-family: 'Mrs Saint Delafield', cursive; font-size: 60px; }

.pesan-kecil {
    font-family: 'Poppins', sans-serif; 
    font-size: 14px;
    color: #555;
    margin: 15px 0;
    line-height: 1.5;
}
        #gameCanvas { background: #000; display: block; }
        .photo-frame { position: absolute; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); background: white; }
        .photo-frame img, .photo-frame video { width: 100%; display: block; }
        .gallery-container { width: 100%; height: 100vh; overflow-y: auto; background: white; position: relative; }
    </style>
</head>
<body>

    <div id="page1" class="screen">
        <h1 class="shorelines">Just for you</h1>
        <input type="text" id="username" placeholder="Nama" style="padding:10px; margin:5px;">
        <input type="number" id="userage" placeholder="Umur" style="padding:10px; margin:5px;">
        <button onclick="toPage2()" style="padding:10px 20px;">Mulai</button>
    </div>

    <div id="page2" class="screen hidden">
        <div style="font-size: 80px; cursor: pointer;" onclick="showPage('page3')">🎁</div>
        <p>Klik Kadonya!</p>
    </div>

    <div id="page3" class="screen hidden">
        <div style="background: var(--paper); padding: 20px; border: 2px solid #000; border-radius: 10px;">
            <h2 id="dispName" class="shorelines"></h2>

            <p class="pesan-kecil">
                            Selamat Ulang Tahun yaaa! <br>
                            Iqkball doain semoga doamu dijabah oleh Allah
                            dan semoga kamu selalu berbakti buat 
                            Ibuk sama Bapak, yang terbaik buat kamu <br>
                            Terimakasih Yaa udah bareng² akuu! ✨
                     </p>

            <button onclick="startCountdown()">SIAP! 🚀</button>
        </div>
    </div>

    <div id="page4" class="screen hidden" style="background: #000; padding: 0;">
        <div id="countdownDisp" style="color: white; font-size: 80px; position: absolute;"></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="page5" class="gallery-container hidden">
        <h1 class="shorelines" style="text-align: center; padding: 50px;">Our Memories ✨</h1>
        <div id="gallery-content">
            <div class="photo-frame" style="width: 200px; top: 150px; left: 10%; transform: rotate(-5deg);"><img src="https://via.placeholder.com/200"></div>
            <div class="photo-frame" style="width: 200px; top: 350px; right: 10%; transform: rotate(5deg);"><img src="https://via.placeholder.com/200"></div>
        </div>
        <div style="height: 1000px;"></div>
    </div>

    <script>
        let userName, userAge, canvas, ctx;
        let gameActive = false, currentTarget = 1;
        let bullets = [], targetObj = null, rocketX = 0;
        let shootInterval;

        function toPage2() {
            userName = document.getElementById('username').value;
            userAge = parseInt(document.getElementById('userage').value);
            if(userName && userAge) {
                document.getElementById('dispName').innerText = "Happy " + userAge + ", " + userName;
                showPage('page2');
            }
        }

        function startCountdown() {
            showPage('page4');
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            rocketX = canvas.width / 2;

            let count = 3;
            const cd = document.getElementById('countdownDisp');
            const timer = setInterval(() => {
                cd.innerText = count;
                if(count === 0) {
                    clearInterval(timer);
                    cd.innerText = "";
                    initGame();
                }
                count--;
            }, 1000);
        }

        function initGame() {
            gameActive = true;
            currentTarget = 1;
            bullets = [];
            spawnTarget();
            
            // Auto-fire interval
            shootInterval = setInterval(() => {
                if(gameActive) bullets.push({ x: rocketX, y: canvas.height - 60 });
            }, 250);

            requestAnimationFrame(update);
        }

        function spawnTarget() {
            if (currentTarget > userAge) {
                endGame();
                return;
            }
            targetObj = {
                x: Math.random() * (canvas.width - 100) + 50,
                y: -50,
                val: currentTarget,
                speed: 2 + (currentTarget * 0.05)
            };
        }

        function update() {
            if (!gameActive) return;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Rocket
            ctx.font = "50px Arial";
            ctx.fillText("🚀", rocketX - 25, canvas.height - 20);

            // Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= 10;
                ctx.fillStyle = "yellow";
                ctx.fillRect(bullets[i].x - 2, bullets[i].y, 4, 15);
                if (bullets[i].y < 0) bullets.splice(i, 1);
            }

            // Target
            if (targetObj) {
                targetObj.y += targetObj.speed;
                ctx.fillStyle = "white";
                ctx.font = "bold 40px Poppins";
                ctx.fillText(targetObj.val, targetObj.x, targetObj.y);

                // Collision Detection
                for (let i = bullets.length - 1; i >= 0; i--) {
                    let b = bullets[i];
                    if (b.x > targetObj.x - 20 && b.x < targetObj.x + 40 && b.y < targetObj.y && b.y > targetObj.y - 40) {
                        bullets.splice(i, 1);
                        currentTarget++;
                        targetObj = null; // Hancur
                        setTimeout(spawnTarget, 300); // Muncul angka berikutnya
                        break;
                    }
                }

                if (targetObj && targetObj.y > canvas.height) {
                    targetObj.y = -50;
                    targetObj.x = Math.random() * (canvas.width - 100) + 50;
                }
            }

            requestAnimationFrame(update);
        }

        window.addEventListener('mousemove', (e) => { rocketX = e.clientX; });
        window.addEventListener('touchmove', (e) => { rocketX = e.touches[0].clientX; e.preventDefault(); }, {passive: false});

        function endGame() {
            gameActive = false;
            clearInterval(shootInterval);
            alert("MISI SELESAI! 🎯");
            showPage('page5');
        }

        function showPage(id) {
            document.querySelectorAll('.screen, .gallery-container').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
